<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: #f5f5f7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #fff;
  width: 420px;
  padding: 40px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.logo {
  margin-bottom: 15px;
}

.logo img {
  max-width: 180px;
}

h1 {
  font-size: 18px;
  margin-bottom: 8px;
}

p {
  font-size: 13px;
  color: #6e6e73;
}

.bar {
  margin-top: 25px;
  width: 100%;
  height: 8px;
  background: #e5e5ea;
  border-radius: 50px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #0071e3;
  transition: width 0.25s ease;
}

.status {
  margin-top: 15px;
  font-size: 12px;
  color: #6e6e73;
}

.top-disclaimer {
  width: 100%;
  background: #0a0a0a;
  color: #ffffff;
  text-align: center;
  font-size: 13px;
  padding: 10px 15px;
  border-bottom: 2px solid #f5c542;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
}
</style>
</head>

<body>

    <div class="top-disclaimer">
  ⚠️ DISCLAIMER: This website is for educational, learning, and awareness purposes only. No malicious or unauthorized use is intended or permitted.
</div>


<div class="card">

  <div class="logo">
    <img src="../assets/images/cc-logo.png" alt="logo">
  </div>

  <h1>Processing Request</h1>
  <p>Please wait while we review your submission.</p>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div class="status" id="status">Starting...</div>

</div>

<script>
let progress = 0;

const fill = document.getElementById("fill");
const status = document.getElementById("status");

const steps = [
  "Validating data...",
  "Checking device info...",
  "Connecting to system...",
  "Finalizing request..."
];

let step = 0;

const interval = setInterval(() => {

  progress += Math.floor(Math.random() * 10) + 5;

  if (progress >= 100) {
    progress = 100;
  }

  fill.style.width = progress + "%";

  if (progress > step * 25 && step < steps.length) {
    status.textContent = steps[step];
    step++;
  }

  if (progress === 100) {
    clearInterval(interval);

    status.textContent = "Complete";

    setTimeout(() => {
      window.location.href = "thankyou.html";
    }, 1000);
  }

}, 250);
</script>

</body>
</html>
